<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DevOps Project v2</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #333; }
        #status { font-weight: bold; }
        .up { color: green; }
        .down { color: red; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 DevOps Final Project</h1>
        <p id="msg">Chargement du backend...</p>
        <p>Statut: <span id="status">Vérification...</span></p>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:5000' : '';
        
        fetch(API_URL + '/api/message')
            .then(res => res.json())
            .then(data => { document.getElementById('msg').innerText = data.message; })
            .catch(() => { document.getElementById('msg').innerText = 'Erreur Backend'; });

        fetch(API_URL + '/health')
            .then(res => res.json())
            .then(data => { 
                document.getElementById('status').innerText = data.status;
                document.getElementById('status').className = 'up';
            })
            .catch(() => { 
                document.getElementById('status').innerText = 'DOWN';
                document.getElementById('status').className = 'down';
            });
    </script>
</body>
</html>
